version: '3.8'

services:

  web:
    image: yamaha-motos-app:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yamaha-motos-web
    environment:
      DJANGO_DEBUG: "0"
      MERCADOPAGO_ACCESS_TOKEN: "REDACTED_ACCESS_TOKEN"
      MERCADOPAGO_PUBLIC_KEY: "REDACTED_PUBLIC_KEY"
      MERCADOPAGO_USE_SANDBOX: "1"
      PAYMENTS_DEMO_MODE: "0"
      # ⚠ Cambia esta IP/dominio por el de tu instancia EC2 antes de hacer build
      PAYMENTS_FRONTEND_BASE_URL: "http://localhost"
    expose:
      - "8000"
    restart: unless-stopped

  flask_payments:
    build:
      context: ./Taller02/flask_payments
      dockerfile: Dockerfile
    container_name: yamaha-flask-payments
    environment:
      MERCADOPAGO_ACCESS_TOKEN: "REDACTED_ACCESS_TOKEN"
      MERCADOPAGO_PUBLIC_KEY: "REDACTED_PUBLIC_KEY"
      MERCADOPAGO_USE_SANDBOX: "1"
      PAYMENTS_DEMO_MODE: "0"
      PAYMENTS_FRONTEND_BASE_URL: "http://localhost"
    expose:
      - "5000"
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: yamaha-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - flask_payments
    restart: unless-stopped
