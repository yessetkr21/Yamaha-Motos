upstream django_web {
    server web:8000;
}

upstream flask_payments {
    server flask_payments:5000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # -----------------------------------------------------------------------
    # Microservicio Flask — Pagos estrangulados (Strangler Pattern)
    # Ruta nueva: /api/v2/pagos/ → flask_payments:5000
    # -----------------------------------------------------------------------
    location /api/v2/pagos/ {
        proxy_pass         http://flask_payments;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # -----------------------------------------------------------------------
    # Monolito Django — rutas legacy /api/v1/ y frontend React
    # Ruta antigua: /api/v1/ → web:8000
    # -----------------------------------------------------------------------
    location /api/v1/ {
        proxy_pass         http://django_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Frontend React y resto de rutas → Django
    location / {
        proxy_pass         http://django_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
